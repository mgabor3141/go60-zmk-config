CONFIG_ZMK_KEYBOARD_NAME="Go60"

CONFIG_USB_DEVICE_VID=0x1D50
CONFIG_USB_DEVICE_PID=0x615E

CONFIG_BT_DIS_PNP_VID=0x1D50
CONFIG_BT_DIS_PNP_PID=0x615E

CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_FULL=y

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=4
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=15

# Per-key RGB (darknao's PR36 branch)
CONFIG_EXPERIMENTAL_RGB_LAYER=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Default to the per-key layer indicators effect (index 4)
# 0=solid 1=breathe 2=spectrum 3=swirl 4=layer-indicators
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=4

# Clear settings on next boot (remove after flashing both halves!)
CONFIG_ZMK_SETTINGS_RESET_ON_START=y
